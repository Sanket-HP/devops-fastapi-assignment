name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Lint & Verify Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint Codebase
        run: ruff check app/

      - name: Test Docker Build
        run: |
          docker build -t fastapi-app-test:latest .

  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /var/www/devops-fastapi-assignment
            
            echo "Pulling latest code changes..."
            git pull origin main
            
            echo "Rebuilding and starting docker containers..."
            docker compose down --remove-orphans
            docker compose up --build -d
            
            # Post-deployment health verification check
            echo "Verifying application health..."
            sleep 5
            for i in {1..6}; do
              if curl -s -f http://localhost/health | grep -q "healthy"; then
                echo "SUCCESS: Service is healthy and responding!"
                exit 0
              fi
              echo "Waiting for service to initialize (Attempt $i/6)..."
              sleep 5
            done
            echo "ERROR: Application health check failed post-deployment!"
            exit 1
